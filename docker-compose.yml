# Quickstart compose: один сервис idf-host с заранее bootstrap'нутым
# procurement-доменом (corporate purchase requests + budget approval).
# После `docker compose up` (~30 сек после билда):
#
#   curl http://localhost:3001/api/agent/procurement/schema
#   npm run demo:rogue   # agent tries $3500 MacBook Pro → 403 missing
#   npm run demo:grant   # requester issues $2500-cap preapproval
#   npm run demo:smart   # agent reads cap → $2400 MacBook Air → 200
#
# Legacy invest demo доступен через `npm run demo:legacy:rogue/grant/smart`
# (domain ещё в host'е, но bootstrap не запускается по умолчанию).
#
# IDF_REPO env var больше не нужен — bootstrap происходит внутри
# контейнера entrypoint'ом.

services:
  idf-host:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pin к конкретному коммиту, если нужна стабильность:
        #   docker compose build --build-arg IDF_REF=<sha>
        IDF_REF: main
    # `image:` намеренно не указан — это заставит compose сразу
    # использовать build вместо попытки pull'нуть несуществующий
    # образ из registry (и видеть `pull access denied` в логах).
    container_name: fold-host
    ports:
      # Override via:  HOST_PORT=3199 docker compose up
      - "${HOST_PORT:-3001}:3001"
    environment:
      - PORT=3001
      - BOOTSTRAP_DOMAIN=procurement
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/api/effects"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
